<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact | SolarTech</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">

    <!-- Mobile Menu Fix CSS (isi file me add kiya hai, agar chahe to responsive.css me move kar dena) -->
    <style>
        .menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 28px;
            height: 20px;
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 0;
            z-index: 1001;
        }

        .menu-toggle span {
            display: block;
            width: 100%;
            height: 3px;
            background-color: #000;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .menu-toggle.active span:nth-child(1) {
            transform: translateY(8.5px) rotate(45deg);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: translateY(-8.5px) rotate(-45deg);
        }

        @media (max-width: 991px) {

            .header .container {
                position: relative;
            }

            .menu-toggle {
                display: flex;
            }

            .navbar .nav-links {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background-color: #fff;
                flex-direction: column;
                align-items: flex-start;
                padding: 20px;
                gap: 15px;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
                display: none;
                z-index: 1000;
            }

            .navbar .nav-links.show {
                display: flex;
            }
        }
    </style>

</head>

<body>

    <!-- Header -->
    <header class="header">

        <div class="container">

            <div class="logo">
                <h2>Solar<span>Tech</span></h2>
            </div>

            <nav class="navbar">

                <ul class="nav-links" id="navLinks">

                    <li><a href="index.html">Home</a></li>

                    <li><a href="services.html" class="active">Services</a></li>

                    <li><a href="products.html">Products</a></li>

                    <li><a href="contact.html">Contact</a></li>

                </ul>

            </nav>

            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <a href="contact.html" class="btn">
                Get Quote
            </a>

        </div>

    </header>


    <!-- ==========================
    Page Banner
    ========================== -->

    <section class="page-banner" data-aos="fade-up">

        <div class="container">

            <h1>Contact Us</h1>

            <p>
                Home / Contact
            </p>

        </div>

    </section>

    <!-- ==========================
    Contact Information
    ========================== -->

    <section class="contact-info" data-aos="fade-right">

        <div class="container">

            <div class="contact-info-container">

                <div class="contact-card">

                    <i class="fa-solid fa-location-dot"></i>

                    <h3>Office Address</h3>

                    <p>Lahore, Pakistan</p>

                </div>

                <div class="contact-card">

                    <i class="fa-solid fa-phone"></i>

                    <h3>Call Us</h3>

                    <p>+92 300 1234567</p>

                </div>

                <div class="contact-card">

                    <i class="fa-solid fa-envelope"></i>

                    <h3>Email Us</h3>

                    <p>info@solartech.com</p>

                </div>

            </div>

        </div>

    </section>

    <!-- ==========================
    Contact Form
    ========================== -->

    <section class="contact-form" data-aos="zoom-in">

        <div class="container">

            <div class="section-title">

                <h4>Get In Touch</h4>

                <h2>Send Us a Message</h2>

                <p>
                    Fill out the form below and our team will contact you as soon as possible.
                </p>

            </div>

            <form class="form">

                <div class="form-group">

                    <input type="text" placeholder="Your Name" required>

                    <input type="email" placeholder="Your Email" required>

                </div>

                <div class="form-group">

                    <input type="tel" placeholder="Phone Number" required>

                    <input type="text" placeholder="Subject" required>

                </div>

                <textarea placeholder="Write Your Message" rows="6" required></textarea>

                <button type="submit" class="btn">

                    Send Message

                </button>

            </form>

        </div>

    </section>

    <!-- ==========================
    Google Map
    ========================== -->

    <section class="map" data-aos="fade-up">

        <iframe
            src="https://www.google.com/maps?q=Lahore,Pakistan&output=embed"
            width="100%"
            height="450"
            style="border:0;"
            allowfullscreen=""
            loading="lazy">
        </iframe>

    </section>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>

    <!-- Mobile Menu Toggle Script -->
    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            navLinks.classList.toggle('show');
        });

        // Menu link pe click karne se menu band ho jaye
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                menuToggle.classList.remove('active');
                navLinks.classList.remove('show');
            });
        });
    </script>

</body>

</html>
